# Healenium Configuration
# Healenium Server URL (local or Docker)
hlm_project_name=UIAutomationTests
healenium.server.url=http://localhost:9090
healenium.report.disable=true

# Enable/disable self-healing
healenium.enabled=true

# Recovery strategy (RECREATE_LOCATOR, COMMON_ATTRIBUTES)
healenium.strategy=RECREATE_LOCATOR

# Number of healing attempts
healenium.recovery.tries=3

# Save screenshots on recovery
healenium.screenshot.on.recovery=true

# Report file location
healenium.report.folder=./healenium-reports

# Debug mode
healenium.debug=false

# Server connection timeout
hlm_connection_timeout=30000
