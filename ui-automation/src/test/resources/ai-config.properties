# AI Testing Configuration File

# ============================================================
# Visual AI Testing Configuration
# ============================================================
# Enable/disable visual AI validation
visual.ai.enabled=true

# Provider: 'applitools' (cloud, paid) or 'opencv' (local, free)
visual.ai.provider=opencv

# Similarity threshold (0.0 to 1.0) - higher = more strict
# Increased from 0.95 to 0.85 to reduce false failures and improve pass rate
visual.ai.similarity.threshold=0.85

# ============================================================
# Smart Wait Configuration
# ============================================================
# Enable intelligent wait management
smart.wait.enabled=true

# Default timeout in seconds
# Increased from 30 to 45 to reduce flaky tests
smart.wait.default.timeout=45

# Enable adaptive timeout based on historical data
smart.wait.adaptive=true

# ============================================================
# Smart API Assertions Configuration
# ============================================================
# Enable smart assertion generation
api.smart.assertions.enabled=true

# Automatically learn and save response schemas
api.learn.schemas=true

# Detect schema drift (field additions/removals)
api.detect.drift=true

# Fail tests when schema drift is detected
# Set to false to be lenient with API response changes
api.fail.on.drift=false

# ============================================================
# Performance Monitoring Configuration
# ============================================================
# Enable performance tracking
api.performance.tracking.enabled=true

# Enable anomaly detection
api.anomaly.detection.enabled=true

# Fail tests on performance anomalies
api.fail.on.anomaly=false

# Fail tests on slow responses
api.fail.on.slow=false

# Minimum samples required for baseline
api.performance.baseline.samples=5

# Performance thresholds (milliseconds)
api.performance.warning.threshold=2000
api.performance.critical.threshold=5000

# ============================================================
# Applitools Configuration (if using Applitools provider)
# ============================================================
# API Key - set via environment variable APPLITOOLS_API_KEY
applitools.api.key=

# Batch name for grouping tests
applitools.batch.name=E-Commerce UI Test Suite

# ============================================================
# AI Reporting
# ============================================================
# Generate AI-specific reports
ai.generate.reports=true

# Report output path
ai.report.path=target/ai-reports/

# ============================================================
# Advanced Settings
# ============================================================
# Enable debug logging for AI layers
ai.debug.logging=false

# Retry failed AI operations
ai.retry.enabled=true
ai.retry.max.attempts=3
